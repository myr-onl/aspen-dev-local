; This file is mounted read-only into the container.
; Xdebug is only activated at runtime if XDEBUG_ENABLE=true in your .env.
; The dev entrypoint wrapper handles enabling/disabling the extension.
;
; PhpStorm: set IDE key to PHPSTORM and listen on the port below.
; VS Code: use PHP Debug extension with the same port.

zend_extension=xdebug

[xdebug]
xdebug.mode=develop,debug
xdebug.start_with_request=yes
xdebug.client_host=${XDEBUG_CLIENT_HOST}
xdebug.client_port=${XDEBUG_CLIENT_PORT}
xdebug.idekey=PHPSTORM
xdebug.log_level=0
